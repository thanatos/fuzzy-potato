<!DOCTYPE html>
<html>
<head>
<title>Groceries {{ GROCERY_EMOJI }} — List</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="favicon.svg" />
<style>
body {
	margin: 0;
}

.lr-pad {
	padding-left: 0.5em;
	padding-right: 0.5em;
}

.butter-bar {
	padding: 0.5em;
	background: hsl(60 100% 75%);
	border-bottom: 1px solid hsl(60 75% 50%);
}

#the-list {
	display: grid;
	grid-template-columns: auto 1fr auto auto auto auto;
	row-gap: 8px;
}

.table-row {
	display: grid;
	grid-column: 1 / -1;
	grid-template-columns: subgrid;
	border-top: 1px solid lightgrey;
	border-bottom: 1px solid lightgrey;
	padding-left: 0.5em;
	padding-right: 0.5em;
	padding-top: 4px;
	padding-bottom: 4px;
}

.table-row.in-cart {
	background: lightgreen;
}

.icon-btn {
	cursor: pointer;
	width: 1em;
	padding-right: 4px;
	padding-left: 4px;
}

.price-widget {
	font-size: 20pt;
	font-family: monospace;
}
.price-drag-rect {
	margin-top: 0.5em;
	height: 2.5em;
	width: 100%;
	background: lightgrey;
	border: 1px solid grey;
}

.drag-handle {
	padding-right: 2px;
	padding-left: 2px;
}

dialog::backdrop {
  background-image: linear-gradient(
    45deg,
    magenta,
    rebeccapurple,
    dodgerblue,
    green
  );
  opacity: 0.75;
}

dialog.generic-dialog > div {
	display: flex;
	flex-direction: column;
}
dialog.generic-dialog > div > div.buttons {
	display: flex;
	flex-direction: row;
	justify-content: end;
	gap: 0.75em;
	margin-top: 0.5em;
}
dialog.generic-dialog > div > div.dialog-x {
	display: flex;
	flex-direction: row;
	justify-content: end;
}
</style>
<script type="module">
import {modalDialog} from '/js/dialogs.js';

let LIST = null;

class GroceryList {
	constructor(urlref) {
		this.pending_update = null;
		this.list_ref = urlref;
		this.raw_json = null;
		this.items = null;
		this.on_update = null;
	}

	async update() {
		if(this.pending_update !== null) {
			this.pending_update.abort();
			this.pending_update = null;
		}
		const abort_controller = new AbortController();
		const pending_update = {
			abort: function() {
				abort_controller.abort();
			},
		};
		this.pending_update = pending_update;
		const response = await fetch(
			this.list_ref,
			{
				signal: abort_controller.signal,
			}
		);
		const data = await response.json();
		this.raw_json = data;
		this.items = data['items'];
		if(this.on_update !== null) {
			this.on_update(this);
		}
	}
}

window.GroceryList = GroceryList;

function initList() {
	const queryString = window.location.search;
	const params = new URLSearchParams(queryString);
	const list_ref = params.get('list_ref');

	LIST = new GroceryList(list_ref);
	LIST.on_update = updateListUi;
	LIST.update();

	checkIfCurrentList(list_ref);
}

async function checkIfCurrentList(our_list) {
	const response = await fetch('/api/list/?current');
	const url = await response.json();
	// TODO: probably should make these relative-refs into just refs.
	console.log(`Current list: ${url}\nOur list: ${our_list}`);
	if(url !== our_list) {
		const warning_bar = document.getElementById("not-current-list");
		const a_el = warning_bar.querySelector('.current-list');
		a_el.setAttribute('href', `/list?list_ref=${encodeURIComponent(url)}`);
		warning_bar.style.display = '';
	}
}

async function addToCart(list, item_name, item_index) {
	await listAction(
		list,
		'add-to-cart',
		{
			item_name,
			item_index,
		},
	);
}

async function removeFromCart(list, item_name, item_index) {
	await listAction(
		list,
		'remove-from-cart',
		{
			item_name,
			item_index,
		},
	);
}

async function shiftItem(original_index, new_index) {
	const new_order = [];

	function push_index(index) {
		new_order.push([
			LIST.items[index]['item_name'],
			LIST.items[index]['item_index']
		]);
	}
	let index = 0;
	for(; index < LIST.items.length; ++index) {
		if(new_index === new_order.length) {
			push_index(original_index)
		}
		if(index != original_index) {
			push_index(index)
		}
	}
	if(new_index === new_order.length) {
		push_index(original_index)
	}

	await listAction(
		LIST,
		'update-order',
		new_order,
	);
}

function editItem(item_div, item) {
	if(item_div.getAttribute('data-being-editted') === 'true') {
		return;
	}

	const edit_el = document.createElement('input');
	edit_el.setAttribute('type', 'text');
	edit_el.setAttribute('value', item['item_name']);
	item_div.replaceChildren(edit_el);
	item_div.setAttribute('data-being-editted', 'true');
	edit_el.focus();
}

const PRELOADED_IMAGES = {
	up_btn: (function() {
		const mvup = document.createElement('img');
		mvup.setAttribute('src', '/images/icons/fa/caret-up.svg');
		mvup.setAttribute('class', 'icon-btn');
		return mvup;
	})(),
};

function updateListUi(list) {
	const new_items = [];
	for(let index = 0; index < list.items.length; ++index) {
		const item = list.items[index];
		const in_cart = item['in_cart'];

		const row = document.createElement('div');
		row.setAttribute('class', 'table-row');
		if(in_cart) {
			row.setAttribute('class', 'table-row in-cart');
		}

		const drag_handle = document.createElementNS(
			'http://www.w3.org/2000/svg',
			'svg',
		);
		const svg_use = document.createElementNS(
			'http://www.w3.org/2000/svg',
			'use',
		);
		svg_use.setAttributeNS(null, 'href', '#drag-handle');
		drag_handle.appendChild(svg_use);
		drag_handle.setAttributeNS(null, 'viewBox', '0 0 8 18');
		drag_handle.setAttributeNS(null, 'width', '8');
		drag_handle.setAttribute('class', 'drag-handle');
		row.appendChild(drag_handle);

		const item_name = document.createElement('div');
		item_name.textContent = item['item_name'];
		item_name.onclick = () => editItem(item_name, item);
		row.appendChild(item_name);

		if(in_cart) {
			const btn = document.createElement('button');
			btn.appendChild(document.createTextNode('Un-got'));
			btn.onclick = () => {
				removeFromCart(list, item['item_name'], item['item_index']);
			}
			row.appendChild(btn);
		} else {
			const btn = document.createElement('button');
			btn.appendChild(document.createTextNode('Got it'));
			btn.onclick = () => {
				addToCart(list, item['item_name'], item['item_index']);
			};
			row.appendChild(btn);
		}

		if(index === 0) {
			row.appendChild(document.createElement('div'));
		} else {
			const mvup = PRELOADED_IMAGES.up_btn.cloneNode();
			mvup.onclick = () => {
				shiftItem(index, index - 1);
			};
			row.appendChild(mvup);
		}

		if(index + 1 === list.items.length) {
			row.appendChild(document.createElement('div'));
		} else {
			const mvdown = document.createElement('img');
			mvdown.setAttribute('src', '/images/icons/fa/caret-down.svg');
			mvdown.setAttribute('class', 'icon-btn');
			mvdown.onclick = () => {
				shiftItem(index, index + 1);
			};
			row.appendChild(mvdown);
		}

		const trash = document.createElement('img');
		trash.setAttribute('src', '/images/icons/fa/trash.svg');
		trash.setAttribute('class', 'icon-btn');
		trash.onclick = () => {
			const body = document.createElement('p');
			body.textContent = (
				`Delete the item “${item['item_name']}”: are you sure?`
			);
			const buttons = [
				{
					text: 'Nope, keep it!',
					signal: 'cancel',
				},
				{
					text: 'Delete',
					signal: 'delete',
				},
			];
			modalDialog(body, buttons).then((event) => {
				if(event.event === 'button' && event.signal === 'delete') {
					removeFromList(
						list,
						item['item_name'],
						item['item_index'],
					);
				}
			});
		};
		row.appendChild(trash);

		new_items.push(row);
	}
	document.getElementById('the-list').replaceChildren(...new_items);
}

async function showPriceDialog(item_name) {
	const promise_pkg = Promise.withResolvers();

	const dialog = document.createElement('dialog');
	const intro_p = document.createElement('p');
	intro_p.textContent = `Enter the price of ${item_name}`;
	dialog.appendChild(intro_p);
	const price_el = document.createElement('input');
	price_p.setAttribute('class', 'price');
	price_p.setAttribute('type', 'text');
	dialog.appendChild(price_el);

	dialog.showModal();
	return promise_pkg.promise;
}

async function addToList(list, item_name) {
	await listAction(list, 'add-item', {item_name});
}

async function removeFromList(list, item_name, item_index) {
	await listAction(list, 'remove-item', {item_name, item_index});
}

async function listAction(list, action, data) {
	const opts = {
		method: 'POST',
		body: JSON.stringify(data),
	};
	await fetch(`${list.list_ref}?action=${action}`, opts);
	await list.update();
}

addEventListener("DOMContentLoaded", (event) => {
	initList();

	const add_text_el = document.getElementById('add-text');
	const do_item_add = function() {
		const item_name = add_text_el.value;
		addToList(LIST, item_name);
		add_text_el.value = '';
	};
	document.getElementById('add-btn').onclick = do_item_add;
	add_text_el.onkeypress = (event) => {
		if(event.key === 'Enter') {
			do_item_add();
		}
	};
});

async function priceDialog(item_name) {
	const intro_text = document.createElement('p');
	intro_text.appendChild(document.createTextNode('Enter the price of “'));
	const item_name_el = document.createElement('strong');
	item_name_el.textContent = item_name;
	intro_text.appendChild(item_name_el);
	intro_text.appendChild(document.createTextNode('”:'));

	const price = document.createElement('input');
	price.setAttribute('type', 'text');
	price.setAttribute('inputmode', 'decimal');
	price.setAttribute('class', 'price-widget');

	const drag_rect = document.createElement('div');
	drag_rect.setAttribute('class', 'price-drag-rect');
	const drag_state = {
		current_drag: null,
	};
	drag_rect.onmousedown = (event) => {
		drag_state.current_drag = {
			start_x: event.screenX,
			start_y: event.screenY,
		};
	};
	drag_rect.onmousemove = (event) => {
		if(drag_state.current_drag !== null) {
			const delta_x = event.screenX - drag_state.current_drag.start_x;
			const delta_y = event.screenY - drag_state.current_drag.start_y;
			console.log(`Drag; delta = ${delta_x}, ${delta_y}`);
		}
	};
	drag_rect.onmouseup = (event) => {
		drag_state.current_drag = null;
	};

	const body = document.createDocumentFragment();
	body.appendChild(intro_text);
	body.appendChild(price);
	body.appendChild(drag_rect);

	const buttons = [
		{
			text: 'Cancel',
			signal: 'cancel',
		},
		{
			text: 'Dunno',
			signal: 'no-price',
		},
		{
			text: 'Enter Price',
			signal: 'price-entered',
		},
	];

	await modalDialog(body, buttons);
}

async function modalDialogExample() {
	const t = document.createElement('template');
	t.innerHTML = '<p>Hello there <b>world</b>. Isn\'t this a splending dialog?!</p><p>What\'s with the 🏳️‍🌈 Rainbow background you say?! Well rainbows are awesome.</p>';
	const buttons = [
		{text: 'Cancel', signal: 'cancel'},
		{text: 'Okie dokie!', signal: 'ok'}
	];
	let result = await modalDialog(t.content, buttons);
	console.log('Dialog result:', result);
}
</script>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 1" width="0" height="0">
<defs>
<g id="drag-handle">
  <line x1="0" x2="8" stroke="black" y1="1" y2="1" stroke-width="2px"></line>
  <line x1="0" x2="8" stroke="black" y1="5" y2="5" stroke-width="2px"></line>
  <line x1="0" x2="8" stroke="black" y1="9" y2="9" stroke-width="2px"></line>
  <line x1="0" x2="8" stroke="black" y1="13" y2="13" stroke-width="2px"></line>
  <line x1="0" x2="8" stroke="black" y1="17" y2="17" stroke-width="2px"></line>
</defs>
</svg>
<div id="not-current-list" class="butter-bar" style="display: none">
  Bruh. 👋 This isn't the <a class="current-list">current list</a>.
</div>
<p class="lr-pad">List:</p>
<div id="the-list">
</div>
<p class="lr-pad" id="item-count"></span>
<p class="lr-pad">
Add to list:<br>
<input type="text" id="add-text"><button id="add-btn">Add</button>
</br>
</p>
</body>
</html>
